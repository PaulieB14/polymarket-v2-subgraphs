specVersion: 1.0.0
description: Polymarket CLOB V2 main — conditions, accounts, markets, trades, orderbook aggregates. Drop-in replacement for V1 main (QmdyCguL…QX8a) with V2 event shapes.
repository: https://github.com/PaulieB14/polymarket-v2-subgraphs
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ConditionalTokens
    network: matic
    source:
      address: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
      abi: ConditionalTokens
      startBlock: 28000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Condition
        - Split
        - Merge
        - Redemption
        - MarketData
        - Collateral
        - Account
        - Global
      abis:
        - name: ConditionalTokens
          file: ./abis/ConditionalTokens.json
      eventHandlers:
        - event: ConditionPreparation(indexed bytes32,indexed address,indexed bytes32,uint256)
          handler: handleConditionPreparation
        - event: ConditionResolution(indexed bytes32,indexed address,indexed bytes32,uint256,uint256[])
          handler: handleConditionResolution
        - event: PositionSplit(indexed address,address,indexed bytes32,indexed bytes32,uint256[],uint256)
          handler: handlePositionSplit
        - event: PositionsMerge(indexed address,address,indexed bytes32,indexed bytes32,uint256[],uint256)
          handler: handlePositionsMerge
        - event: PayoutRedemption(indexed address,address,indexed bytes32,indexed bytes32,uint256[],uint256)
          handler: handlePayoutRedemption
      file: ./src/mapping.ts

  - kind: ethereum
    name: CtfExchangeV2
    network: matic
    source:
      address: "0xE111180000d2663C0091e4f400237545B87B996B"
      abi: CtfExchangeV2
      startBlock: 84902353
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - OrderFilledEvent
        - OrdersMatchedEvent
        - EnrichedOrderFilled
        - Transaction
        - Orderbook
        - OrdersMatchedGlobal
        - Global
        - Account
        - MarketPosition
        - MarketProfit
        - MarketData
        - Builder
      abis:
        - name: CtfExchangeV2
          file: ./abis/CtfExchangeV2.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint8,uint256,uint256,uint256,uint256,bytes32,bytes32)
          handler: handleOrderFilled
        - event: OrdersMatched(indexed bytes32,indexed address,uint8,uint256,uint256,uint256)
          handler: handleOrdersMatched
      file: ./src/mapping.ts

  - kind: ethereum
    name: NegRiskCtfExchangeV2
    network: matic
    source:
      address: "0xe2222d279d744050d28e00520010520000310F59"
      abi: NegRiskCtfExchangeV2
      startBlock: 84902353
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - OrderFilledEvent
        - OrdersMatchedEvent
        - EnrichedOrderFilled
        - Transaction
        - Orderbook
        - OrdersMatchedGlobal
        - Global
        - Account
        - MarketPosition
        - MarketProfit
        - MarketData
        - Builder
      abis:
        - name: NegRiskCtfExchangeV2
          file: ./abis/NegRiskCtfExchangeV2.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint8,uint256,uint256,uint256,uint256,bytes32,bytes32)
          handler: handleOrderFilledNegRisk
        - event: OrdersMatched(indexed bytes32,indexed address,uint8,uint256,uint256,uint256)
          handler: handleOrdersMatchedNegRisk
      file: ./src/mapping.ts
