type GlobalStats @entity(immutable: false) {
  id: ID!                               # singleton "global"
  tradesQuantity: BigInt!
  buysQuantity: BigInt!
  sellsQuantity: BigInt!
  collateralVolume: BigInt!             # raw (USDC.e 6dp)
  scaledCollateralVolume: BigDecimal!   # normalized
  collateralFees: BigInt!
  scaledCollateralFees: BigDecimal!
  tradersCount: BigInt!
  marketsCount: BigInt!
  buildersCount: BigInt!
}

type OrderFilledEvent @entity(immutable: true) {
  id: ID!                               # txHash-logIndex
  transactionHash: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  orderHash: Bytes!
  maker: Account!
  taker: Account!
  side: Int!                            # 0 BUY, 1 SELL (from Side enum)
  market: Market!
  tokenId: BigInt!
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
  collateralAmount: BigInt!             # derived: BUY → makerAmount, SELL → takerAmount
  tokenAmount: BigInt!                  # derived: opposite of collateralAmount
  price: BigDecimal!                    # collateralAmount / tokenAmount
  size: BigDecimal!                     # scaled tokenAmount
  fee: BigInt!
  builder: Bytes!                       # bytes32 builder code (may be zero)
  metadata: Bytes!                      # bytes32 metadata
  exchange: ExchangeType!
}

type OrdersMatchedEvent @entity(immutable: true) {
  id: ID!                               # txHash-logIndex
  transactionHash: Bytes!
  timestamp: BigInt!
  blockNumber: BigInt!
  takerOrderHash: Bytes!
  takerOrderMaker: Account!
  side: Int!
  market: Market!
  tokenId: BigInt!
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
  exchange: ExchangeType!
}

type Account @entity(immutable: false) {
  id: ID!                               # address hex
  tradesQuantity: BigInt!
  buysQuantity: BigInt!
  sellsQuantity: BigInt!
  collateralVolume: BigInt!
  scaledCollateralVolume: BigDecimal!
  lastTradedTimestamp: BigInt!
  fills: [OrderFilledEvent!]! @derivedFrom(field: "maker")
}

type Market @entity(immutable: false) {
  id: ID!                               # tokenId decimal string
  tokenId: BigInt!
  tradesQuantity: BigInt!
  buysQuantity: BigInt!
  sellsQuantity: BigInt!
  collateralVolume: BigInt!
  scaledCollateralVolume: BigDecimal!
  collateralFees: BigInt!
  scaledCollateralFees: BigDecimal!
  lastPrice: BigDecimal!
  lastActiveTimestamp: BigInt!
}

type Builder @entity(immutable: false) {
  id: ID!                               # bytes32 builder code
  orderCount: BigInt!
  volume: BigInt!
  scaledVolume: BigDecimal!
  fees: BigInt!
  scaledFees: BigDecimal!
  firstSeenTimestamp: BigInt!
  lastSeenTimestamp: BigInt!
}

enum ExchangeType {
  CTF
  NEG_RISK
}
